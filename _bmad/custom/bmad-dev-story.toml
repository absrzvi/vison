# Team overrides for bmad-dev-story.
# Scalars override base, arrays append.

[workflow]

# Mandatory Pre-Flight block — agent must output this BEFORE the first RED test.
# Any open question must be resolved (or explicitly accepted as risk) before coding begins.
persistent_facts = [
  "MANDATORY PRE-FLIGHT GATE: Before writing the first failing test, output a Pre-Flight block with these four sections: (1) Assumptions — one per line, things inferred from the story that weren't explicit; (2) Open Questions — anything genuinely ambiguous — STOP and ask if any exist; (3) Simplicity Check — components/hooks/endpoints you'll add and WHY each is necessary, plus things you considered and decided NOT to add; (4) Surgical-Change Test — exact list of files you'll touch and which story AC or security bullet each change traces to. This block is required by the DoD checklist. A missing Pre-Flight block is a QA checklist FAIL.",
  "SECURITY TESTS FIRST: The story's '## Security Tests' section enumerates tests that must be written in the RED phase, before any other tests. Write them, confirm they fail for the right reason, then proceed to domain tests.",
  "FOUR E2E PATHS: When the story involves UI, Playwright tests must cover all four paths — happy path, auth failure, validation/error, and edge-case/boundary. Missing any path is a QA checklist FAIL.",
  "QA SCORE GATE: Story cannot be marked DONE unless the QA score (computed by bmad-qa-generate-e2e-tests) is >= 85/100.",
  "SECURITY SENTINEL: Run bmad-security-sentinel in parallel with bmad-code-review on every story before marking DONE. Never skip.",

  # E4 retrospective finding A2: story 4-5 was sent to code-review with `pytest 117 PASS / 2 FAIL`.
  # Reviewer time was wasted chasing test failures instead of reading code. The "100% pass before
  # review" discipline in Amelia's role description was violated. Make the gate explicit.
  "NEVER FLIP STATUS TO REVIEW WITH RED TESTS: Before changing story status from in-progress to review, re-run the full quality gate (pytest, mypy --strict, ruff) and confirm: (a) all tests pass — 0 failures, 0 errors; (b) mypy --strict reports 0 errors; (c) ruff reports 0 violations; (d) coverage gate is met (≥90% per story AC, or whatever the story specifies). If any of these fail, the story stays in-progress. Reviewer time is for reading code, not for chasing test failures. This is non-negotiable.",

  # E10 retrospective finding A1: 5 of 6 Epic-10 stories carried a BLOCKER into code
  # review, ALL the same species — green tests that did not exercise the real production
  # path (test/prod divergence). 10-4's plumbing was dead in prod while synthetic-kwargs
  # unit tests passed; 10-5's integration tests would ForeignKeyViolation on first run, so
  # the novel SQL had zero passing coverage. Both hid under "integration deferred to CI."
  # Docker now runs locally — close the gap by making integration EXECUTION a pre-review gate.
  "INTEGRATION TESTS MUST ACTUALLY RUN BEFORE REVIEW (HARD GATE): If a story has any integration tests (e.g. testcontainers, real-DB, real-broker, cross-container, or any test marked `integration`), they MUST be executed and pass — not merely written — before the story flips from in-progress to review. 'Deferred to CI' is NOT acceptable when the test runner is available locally (Docker is now available — `docker info` to confirm; start it if down). If integration tests genuinely cannot run (runner truly unavailable after a real attempt), the story STAYS in-progress and you HALT and tell the user rather than flipping to review on unit/RTL coverage alone. This gate exists because un-run integration tests were the cover under which 3 of Epic-10's 5 blockers reached (and passed) review. Run them; watch them pass on the real path; only then flip to review.",

  # E11 retrospective finding A2 (2026-06-15): S5's degraded-banner floor could be set to a
  # VALID-but-gate-disabling 0.0 (fail-open), and a malformed STORED gate value risked
  # disabling the gate rather than falling back. The create-story GATE-VALUE SEMANTICS rule
  # makes the AC NAME the bad value + the fail-safe; this Pre-Flight check makes the dev VERIFY
  # the guard is implemented and tested before flipping to review. Two halves of one gate.
  "PRE-FLIGHT FAIL-SAFE CHECK (gate/threshold values): If the story touches any value that drives a gate, threshold, or comparison (the create-story GATE-VALUE SEMANTICS rule flags these in the ACs), the Pre-Flight block MUST confirm THREE things are implemented AND covered by a test before the story flips to review: (1) the API boundary REJECTS in-range-but-semantically-wrong values (e.g. a gate-disabling 0.0 floor) with the project 422 envelope — not just type/range validation; (2) a malformed/missing/NULL/non-finite STORED value makes the consumer fail SAFE to the hardcoded default — NEVER fail-open (no value can silently disable the gate); (3) there is a test that drives the real consumer (not just a re-read of the config) proving the safe behaviour. If the story has no gate/threshold value, state 'N/A — no gate value' in Pre-Flight. A gate value with no fail-safe test is a Pre-Flight FAIL.",
]
