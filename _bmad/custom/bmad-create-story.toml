# Team overrides for bmad-create-story workflow.
# Committed to repo — applies to every developer on the project.
# Arrays append to the base customize.toml; scalars override.

[workflow]

persistent_facts = [
  # A1: For every file marked UPDATE in the story, read the FULL file (not just the section
  # being changed). Document in Dev Notes: (a) current state — what the file does today,
  # (b) what this story changes — the specific sections/behaviors being modified,
  # (c) what must be preserved — existing interactions and behaviors the story must not break.
  # Skipping this is the primary cause of high review patch counts (E3 retrospective finding A1).
  "STORY CONTEXT RULE — FULL FILE READS: For every file marked UPDATE in the story tasks, read the complete file before writing Dev Notes. Document three things: current state (what it does today), what this story changes (specific sections being modified), and what must be preserved (existing behaviors the story must not break). Never summarise from partial reads.",

  # A2: When the story involves any CSS work (new .css file, modifying an existing one,
  # or any component that uses design tokens), include the canonical token list in Dev Notes.
  # Source of truth: control-centre/src/styles/colors_and_type.css
  # Common mistake that has already caused review cycles: --obb-sev-warning does not exist
  # (use --obb-sev-medium); --obb-sev-danger does not exist (use --obb-sev-critical).
  "STORY CONTEXT RULE — CSS TOKENS: When the story involves any CSS work, include in Dev Notes the complete list of --obb-* tokens from control-centre/src/styles/colors_and_type.css. Call out the common mistakes explicitly: --obb-sev-warning does NOT exist (use --obb-sev-medium); --obb-sev-danger does NOT exist (use --obb-sev-critical). Severity ramp: --obb-sev-critical (red), --obb-sev-high (orange), --obb-sev-medium (amber), --obb-sev-advisory (blue), --obb-sev-normal (green).",

  # E4 retrospective finding A3: epics.md was written upfront in BMAD Phase 3, before
  # shared/oebb_shared/events/payloads.py shipped. Several stories had payload definitions
  # in epics.md that diverged from the actually-shipped Pydantic models in shared/. Caught
  # in 4-9 and 4-10 during create-story (avoided silent re-spec), but only because of
  # explicit comparison. Codify the check.
  "STORY CONTEXT RULE — PAYLOAD SPEC AUDIT: Before writing AC text for any story that emits or consumes an event, diff the payload definition in epics.md against the shipped Pydantic model in shared/src/oebb_shared/events/payloads.py. If they diverge in field names, types, or shape, do NOT silently pick one. Surface the divergence in a 'Decisions' section of the story with options (use shipped shape vs change shared/ contract) and the cost of each. The shipped shared/ contract is almost always the right choice — changing it cascades to event-store + cloud-backend + contract tests. epics.md is a snapshot, not a source of truth.",

  # E4 phase-2 retrospective finding A5: when a story's changes contradict an existing ADR
  # (rename an event type, change a payload shape, add a new ingest endpoint), the story
  # MUST include a task checkbox to update that ADR. Forgetting this leaves the ADR actively
  # misleading future developers. Example: 4-9 renamed LEDGER_DRIFT_ALERT → OBSERVATION
  # but ADR-17 was not updated until the phase-2 retro.
  "STORY CONTEXT RULE — ADR FRESHNESS: Before writing tasks, search architecture.md for any ADR that describes the event types, payload shapes, or architectural patterns this story changes. If any ADR is contradicted by the story's changes, add an explicit checkbox to the story's task list: '[ ] Update ADR-X in _bmad-output/planning-artifacts/architecture.md to reflect [specific change]'. This must be done in the same commit that ships the story. Cross-reference: stories touching EventType enum, payload classes in shared/, or fusion ingest endpoints will almost always need an ADR update.",

  # Load project-context.md which now contains: async stale-closure patterns (A3),
  # full CSS token reference (A2 backing), ADR-2 + ADR-18 full text, E4 dependency status.
  "file:{project-root}/project-context.md",
]
