stages:
  - lint
  - security
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

default:
  image: python:3.11-slim
  cache:
    paths:
      - .cache/pip/

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:shared:
  stage: lint
  script:
    - pip install ruff mypy pydantic>=2.7 pydantic-settings>=2.2 structlog>=24.1
    - cd shared && python -m ruff check src/ tests/
    - cd shared && python -m mypy --strict src/

lint:event-store:
  stage: lint
  script:
    - pip install -e shared/
    - pip install -e "event-store/[dev]"
    - cd event-store && python -m ruff check src/ tests/
    - cd event-store && python -m mypy --strict src/

lint:cloud-backend:
  stage: lint
  script:
    - pip install -e shared/
    - pip install -e "cloud-backend/[dev]"
    - cd cloud-backend && python -m ruff check src/ tests/
    - cd cloud-backend && python -m mypy --strict src/

lint:fusion:
  stage: lint
  script:
    - pip install -e shared/
    - pip install -e "fusion/[dev]"
    - cd fusion && python -m ruff check src/ tests/
    - cd fusion && python -m mypy --strict src/

lint:cloud-sync:
  stage: lint
  script:
    - pip install -e shared/
    - pip install -e "cloud-sync/[dev]"
    - cd cloud-sync && python -m ruff check src/ tests/
    - cd cloud-sync && python -m mypy --strict src/

# ── Security ──────────────────────────────────────────────────────────────────

security:bandit:
  stage: security
  script:
    - pip install bandit
    - bandit -r shared/src event-store/src cloud-backend/src fusion/src cloud-sync/src -ll
  allow_failure: false

security:detect-secrets:
  stage: security
  script:
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline
  allow_failure: false

# ── Test ──────────────────────────────────────────────────────────────────────

test:shared:
  stage: test
  # --cov-fail-under=80 enforces NFR12 (≥80% coverage); contract marker adds AC1 envelope/EventType tests (Epic-1 retro A3)
  script:
    - pip install -e "shared/[dev]"
    - cd shared && python -m pytest tests/ -m "unit or contract" --cov=oebb_shared --cov-report=term-missing --cov-fail-under=80

test:event-store:
  stage: test
  # E4-S7: AC9 raises coverage gate to 90% (was 80%) AND enforces p99 < 50ms
  # strict latency on Linux (Windows dev runs loosen to 200ms).
  script:
    - pip install -e shared/
    - pip install -e "event-store/[dev]"
    - cd event-store && python -m pytest tests/ -m "unit or contract or integration" --cov=event_store --cov-report=term-missing --cov-fail-under=90

test:fusion:
  stage: test
  # E4-S6: fusion alert correlation & suppression; ≥90% coverage (per story AC12)
  script:
    - pip install -e shared/
    - pip install -e "fusion/[dev]"
    - cd fusion && python -m pytest tests/ -m "unit or contract or integration" --cov=fusion --cov-report=term-missing --cov-fail-under=90

test:cloud-sync:
  stage: test
  # E4-CS1: cloud-sync onboard MQTT gateway; ≥90% coverage (per story AC11)
  script:
    - pip install -e shared/
    - pip install -e "cloud-sync/[dev]"
    - cd cloud-sync && python -m pytest tests/ -m "unit or contract or integration" --cov=cloud_sync --cov-report=term-missing --cov-fail-under=90

test:cloud-backend:
  stage: test
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: oebb
        POSTGRES_PASSWORD: oebb
        POSTGRES_DB: oebb
  variables:
    DATABASE_URL: postgresql+asyncpg://oebb:oebb@postgres:5432/oebb
  script:
    - pip install -e shared/
    - pip install -e "cloud-backend/[dev]"
    - cd cloud-backend && python -m pytest tests/ --cov=cloud_backend --cov-report=term-missing --cov-fail-under=80

# ── Build ──────────────────────────────────────────────────────────────────────

build:event-store:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -f event-store/Dockerfile -t oebb/event-store:$CI_COMMIT_SHORT_SHA .
  only:
    - master

build:cloud-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -f cloud-backend/Dockerfile -t oebb/cloud-backend:$CI_COMMIT_SHORT_SHA .
  only:
    - master
