services:
  event-store:
    volumes:
      - ./event-store/src:/app/src
      - ./shared/src:/app/shared_src
    environment:
      DB_PATH: /data/events-dev.db
    command: ["uvicorn", "event_store.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  cloud-backend:
    volumes:
      - ./cloud-backend/src:/app/src
      - ./shared/src:/app/shared_src
    environment:
      LOG_LEVEL: DEBUG
    command: ["uvicorn", "cloud_backend.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]

  snmp-stub:
    image: tandrup/snmpsim
    volumes:
      - ./vlan-pollers/tests/fixtures:/usr/local/snmpsim/data
    ports:
      - "1161:161/udp"

  mock-vlans:
    image: python:3.11-slim-bookworm
    volumes:
      - ./vlan-pollers/tests/mocks:/app
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn -q &&
             uvicorn mock_vlans:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"

  vlan-pollers:
    build: ./vlan-pollers
    volumes:
      - ./vlan-pollers/src:/app/src
      - ./shared/src:/app/shared_src
    environment:
      VEHICLE_ID: OBB-TEST-4711
      SNMP_HOST: snmp-stub
      SNMP_PORT: 161
      SNMP_COMMUNITY: public
      EVENT_STORE_URL: http://event-store:8001
      FUSION_URL: http://fusion:8003
      INFERENCE_URL: http://inference:8004
      RTSP_INGEST_URL: http://rtsp-ingest:8005
      APC_URL: http://mock-vlans:8010/apc
      PIS_URL: http://mock-vlans:8010/pis
      RESERVATION_URL: http://mock-vlans:8010/reservation
    depends_on:
      - event-store
      - snmp-stub
      - mock-vlans
    restart: on-failure
