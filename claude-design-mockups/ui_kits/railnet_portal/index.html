<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ÖBB Railnet — Captive Portal · UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(ellipse at top, #f3f3f5 0%, #e6e6ea 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    #root { width: 100%; display: flex; justify-content: center; }

    @keyframes rn-spin { to { transform: rotate(360deg); } }
    @keyframes rn-rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes rn-pop {
      0%   { opacity: 0; transform: scale(.6); }
      60%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="copy.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="LanguagePicker.jsx"></script>
  <script type="text/babel" src="PortalShell.jsx"></script>
  <script type="text/babel" src="PortalWelcome.jsx"></script>
  <script type="text/babel" src="PortalConnect.jsx"></script>
  <script type="text/babel" src="PortalConnected.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
